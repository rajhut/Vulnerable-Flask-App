name: AI Code Review Trigger
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  call-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write # Para la autenticación del WIF

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/857328543354/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-agent-reviewer@gemini-enterprise-491518.iam.gserviceaccount.com'

      - name: Invoke AI Agent
        id: agent_call
        run: |
          # 1. Definir el prompt
          PROMPT="revisar el PR #${{ github.event.pull_request.number }} de github.com/${{ github.repository }}"

          # 2. Crear Sesion
          SESSION_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            $BASE_URL:query \
            -d "{
              \"class_method\": \"async_create_session\",
              \"input\": {\"user_id\": \"${{ github.actor }}"\"}
            }")
          
          # Extraemos el ID de la sesión
          SESSION_ID=$(echo $SESSION_RESPONSE | jq -r '.output.id')
          
          if [ "$SESSION_ID" == "null" ] || [ -z "$SESSION_ID" ]; then
            echo "Error al crear sesión: $SESSION_RESPONSE"
            exit 1
          fi
          
          echo "Sesión creada con éxito: $SESSION_ID"
          
          # 3. Construir el JSON con la estructura de objeto anidado
          JSON_PAYLOAD=$(jq -n \
            --arg uid "${{ github.actor }}" \
            --arg msg "$PROMPT" \
            '{
              "class_method": "async_stream_query",
              "input": {
                "user_id": $uid,
                "session_id": $SESSION_ID
                "message": $msg
              }
            }')
          
          # 3. Llamada al API
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            "https://us-central1-aiplatform.googleapis.com/v1/projects/gemini-enterprise-491518/locations/us-central1/reasoningEngines/6857918454985392128:streamQuery?alt=sse" \
            -d "$JSON_PAYLOAD")

          echo "RAW RESPONSE: $RESPONSE"

          # 4. Extraer el resultado
          # Normalmente la respuesta viene en .output.content o simplemente .output
          RESULT=$(echo $RESPONSE | jq -r '.output // .answer // "Error: Estructura de respuesta no reconocida."')

          # 5. Guardar para el siguiente paso
          echo "REVIEW_TEXT<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        uses: mshick/add-pr-comment@v2
        if: steps.agent_call.outputs.REVIEW_TEXT != ''
        with:
          message: |
            ## 🤖 Reseña de IA
            ${{ steps.agent_call.outputs.REVIEW_TEXT }}
