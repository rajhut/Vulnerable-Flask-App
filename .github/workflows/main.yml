name: AI Code Review Trigger
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  call-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write # Para la autenticación del WIF

    steps:
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/857328543354/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-agent-reviewer@gemini-enterprise-491518.iam.gserviceaccount.com'

      - name: Invoke AI Agent
        id: agent_call
        run: |
          # 1. Definir el prompt
          PROMPT="revisar el PR #${{ github.event.pull_request.number }} de github.com/${{ github.repository }}"
          
          # 2. Construir el JSON con la estructura de objeto anidado
          # user_id: usamos el usuario que disparó el PR
          # session_id: usamos el ID de ejecución del workflow para que sea único
          JSON_PAYLOAD=$(jq -n \
            --arg uid "${{ github.actor }}" \
            --arg sid "${{ github.run_id }}" \
            --arg msg "$PROMPT" \
            '{
              "input": {
                "user_id": $uid,
                "session_id": $sid,
                "message": $msg
              }
            }')
          
          # 3. Llamada al API
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD" \
            https://us-central1-aiplatform.googleapis.com/v1/projects/gemini-enterprise-491518/locations/us-central1/reasoningEngines/6857918454985392128:query)

          echo "RAW RESPONSE: $RESPONSE"

          # 4. Extraer el resultado
          # Normalmente la respuesta viene en .output.content o simplemente .output
          RESULT=$(echo $RESPONSE | jq -r '.output // .answer // "Error: Estructura de respuesta no reconocida."')

          # 5. Guardar para el siguiente paso
          echo "REVIEW_TEXT<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Review Comment
        uses: mshick/add-pr-comment@v2
        if: steps.agent_call.outputs.REVIEW_TEXT != ''
        with:
          message: |
            ## 🤖 Reseña de IA
            ${{ steps.agent_call.outputs.REVIEW_TEXT }}
