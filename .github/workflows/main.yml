name: AI Code Review Trigger
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  call-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write # Para la autenticación del WIF

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/857328543354/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-agent-reviewer@gemini-enterprise-491518.iam.gserviceaccount.com'

      - name: Invoke AI Agent
        id: agent_call
        run: |
          # 1. Configuración de Variables
          LOCATION="us-central1"
          PROJECT="gemini-enterprise-491518"
          AGENT_ID="6857918454985392128"
          USER_ID="${{ github.actor }}"
          BASE_URL="https://$LOCATION-aiplatform.googleapis.com/v1/projects/$PROJECT/locations/$LOCATION/reasoningEngines/$AGENT_ID"

          echo "### 1. CREANDO SESIÓN ###"
          SESSION_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            "$BASE_URL:query" \
            -d "{
              \"class_method\": \"async_create_session\",
              \"input\": {\"user_id\": \"$USER_ID\"}
            }")
          
          SESSION_ID=$(echo "$SESSION_RESPONSE" | jq -r '.output.id // empty')
          
          if [ -z "$SESSION_ID" ] || [ "$SESSION_ID" == "null" ]; then
            echo "Error: No se pudo obtener Session ID. Respuesta: $SESSION_RESPONSE"
            exit 1
          fi
          echo "Sesión exitosa: $SESSION_ID"
          
          echo "### 2. EJECUTANDO STREAM QUERY ###"
          PROMPT="revisar el PR #${{ github.event.pull_request.number }} de github.com/${{ github.repository }}"
          
          JSON_PAYLOAD=$(jq -n \
            --arg uid "$USER_ID" \
            --arg sid "$SESSION_ID" \
            --arg msg "$PROMPT" \
            '{
              "class_method": "async_stream_query",
              "input": {
                "user_id": $uid,
                "session_id": $sid,
                "message": $msg
              }
            }')

          # Guardamos el stream en un archivo para evitar errores de escape en variables
          curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            "$BASE_URL:streamQuery?alt=sse" \
            -d "$JSON_PAYLOAD" > raw_stream.txt
          
          # 3. PROCESAMIENTO RECURSIVO (La clave)
          # '.. | .text?' busca la palabra 'text' en cualquier nivel del JSON.
          # -j une todo sin espacios extra.
          RESULT=$(sed 's/^data: //g' raw_stream.txt | jq -rj 'select(.content.role == "model") | .content.parts[]?.text // empty')

          if [ -z "$RESULT" ]; then
            echo "Log de error (Raw):"
            cat raw_stream.txt
            RESULT="Error: El agente no generó texto. Revisa si el PR tiene archivos legibles."
          fi

          # 4. EXPORTAR A GITHUB_OUTPUT
          echo "REVIEW_TEXT<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # 5. LÓGICA DE BLOQUEO (TRUNCAR PR)
          # Buscamos palabras clave que indiquen fallos graves. 
          # Puedes ajustar esta lista según lo que tu agente suela escribir.
          if echo "$RESULT" | grep -Ei "BLOCKER|Vulnerabilidad Crítica|Vulnerabilidad de Seguridad|Vulnerabilidades Críticas|Crítico|Crítica" > /dev/null; then
            echo "::error::Se detectaron vulnerabilidades críticas. Bloqueando el Pull Request."
            exit 1  # Esto hace que el Job de GitHub falle
          fi

      - name: Post Review Comment
        uses: mshick/add-pr-comment@v2
        # El cambio clave está aquí: 'always()' permite que corra aunque el agente falle
        if: always() && steps.agent_call.outputs.REVIEW_TEXT != ''
        with:
          message: |
            ## 🤖 Reseña de IA (Vertex AI)
            ${{ steps.agent_call.outputs.REVIEW_TEXT }}
